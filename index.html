<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">

<title>Hotel Bookings Analytics Dashboard | Al-Zaeem Al-Azhari University</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  :root{--green:#2e7d32;--blue:#1565c0;--navy:#0d3b66;--orange:#ef6c00;--teal:#00838f;--red:#c62828;
        --bg:#eef1f6;--card:#fff;--ink:#1f2733;--muted:#6b7686}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  header{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:13px 20px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  header img{height:52px;width:52px;object-fit:contain;background:#fff;border-radius:9px;padding:4px}
  header .ttl{flex:1;text-align:center}
  header h1{margin:0;font-size:18px;font-weight:800}header p{margin:3px 0 0;font-size:12.5px;opacity:.92}
  .langbtn{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.5);color:#fff;border-radius:20px;padding:7px 15px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
  .langbtn:hover{background:rgba(255,255,255,.28)}
  nav{background:var(--card);box-shadow:0 1px 8px rgba(20,40,80,.08);display:flex;gap:2px;padding:0 12px;overflow-x:auto;position:sticky;top:0;z-index:20}
  nav button{background:none;border:none;border-bottom:3px solid transparent;padding:13px 14px;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:inherit}
  nav button.active{color:var(--blue);border-bottom-color:var(--blue)}nav button:hover{color:var(--navy)}
  .filterbar{background:#fff;border-bottom:1px solid #e6eaf0;padding:10px 16px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;position:sticky;top:46px;z-index:19}
  .filterbar label{font-size:13px;color:var(--muted);font-weight:700}
  .filterbar select{padding:7px 11px;border:1px solid #d4dae3;border-radius:8px;font-family:inherit;font-size:13.5px;font-weight:600}
  .filterbar .chip{margin-inline-start:auto;font-size:12.5px;color:var(--muted)}
  .wrap{max-width:1180px;margin:0 auto;padding:18px 14px 60px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px}
  .kpi{background:var(--card);border-radius:13px;padding:15px;box-shadow:0 2px 9px rgba(20,40,80,.06);border-top:4px solid var(--blue)}
  .kpi.g{border-color:var(--green)}.kpi.o{border-color:var(--orange)}.kpi.t{border-color:var(--teal)}.kpi.p{border-color:#7b1fa2}.kpi.r{border-color:var(--red)}
  .kpi .v{font-size:23px;font-weight:800;line-height:1.1}.kpi .l{font-size:12.5px;color:var(--muted);margin-top:5px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
  .card{background:var(--card);border-radius:15px;padding:17px;box-shadow:0 2px 11px rgba(20,40,80,.07);margin-bottom:15px}
  .card.full{grid-column:1/-1}.card h3{margin:0 0 3px;font-size:16px;color:var(--navy)}.card .sub{font-size:12px;color:var(--muted);margin-bottom:11px}
  .chartbox{position:relative;height:300px}.chartbox.tall{height:430px}
  .insight{background:#fff8e1;border:1px solid #ffe082;border-radius:11px;padding:13px 15px;margin-top:13px;font-size:13.6px;line-height:1.85}.insight b{color:var(--orange)}
  .legend2{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;margin:6px 0}.legend2 span{display:inline-flex;align-items:center;gap:6px}.dot{width:11px;height:11px;border-radius:50%}
  .controls{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:11px;align-items:center}
  input[type=search],select.tbl{padding:8px 11px;border:1px solid #d4dae3;border-radius:8px;font-family:inherit;font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:8px 10px;border-bottom:1px solid #eef1f5}
  html[dir=ltr] th,html[dir=ltr] td{text-align:left}html[dir=rtl] th,html[dir=rtl] td{text-align:right}
  th{background:var(--navy);color:#fff;cursor:pointer;position:sticky;top:0;white-space:nowrap}th:hover{background:var(--blue)}tbody tr:hover{background:#f0f6ff}
  .badge{padding:3px 8px;border-radius:18px;font-size:11px;font-weight:700;white-space:nowrap}.b-hi{background:#fdecea;color:var(--red)}.b-lo{background:#e8f5e9;color:var(--green)}.b-mid{background:#eef1f5;color:#5a6675}
  .tablewrap{max-height:500px;overflow:auto;border-radius:9px;border:1px solid #eef1f5}
  .rec{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid #eef1f5;border-inline-start:5px solid var(--blue);border-radius:11px;padding:14px 16px;margin-bottom:11px}
  .rec.up{border-inline-start-color:var(--green)}.rec.down{border-inline-start-color:var(--red)}.rec.warn{border-inline-start-color:var(--orange)}
  .rec .ic{font-size:22px}.rec h4{margin:0 0 4px;font-size:15px}.rec p{margin:0;font-size:13.3px;color:#444;line-height:1.7}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:22px}

  color:'#2b3645',font:{weight:'bold',size:10},

let lang='en',page=0,charts=[],fcity='all',fmonth='all';
const L=()=>I18N[lang];
const mlabels=()=>MONTHS[lang];
const cities=()=>['Riyadh','Al-madinah'];
function destroy(){charts.forEach(c=>c.destroy());charts=[]}
function mk(id,cfg){const c=new Chart(document.getElementById(id),cfg);charts.push(c);return c}

// ----- filtering / aggregation from granular records -----
function recs(){return D.records.filter(r=>(fcity==='all'||r.city===fcity)&&(fmonth==='all'||r.month==+fmonth))}
function sum(a,k){return a.reduce((s,x)=>s+x[k],0)}
function selCities(){return fcity==='all'?cities():[fcity]}
function selMonths(){return fmonth==='all'?[1,2,3,4,5,6]:[+fmonth]}
function avail(){let a=0;for(const c of selCities())for(const m of selMonths())a+=(D.op_count[c+'|'+m]||0)*D.dim[m-1];return a}
function unitsF(){return D.units.filter(u=>(fcity==='all'||u.city===fcity)&&(fmonth==='all'||u.months.includes(+fmonth)))}
function kpis(){const R=recs();const s=sum(R,'sales'),n=sum(R,'nights'),fee=sum(R,'fee'),vat=sum(R,'vat');
  const av=avail();return{sales:s,nights:n,occ:av?n/av*100:0,adr:n?s/n:0,net:s-fee-vat,fee:fee,
    units:new Set(R.map(r=>r.city)).size?unitsF().length:0,margin:s?(s-fee-vat)/s*100:0}}
function byMonth(){return D.months.map((lab,i)=>{const m=i+1;const R=D.records.filter(r=>r.month===m&&(fcity==='all'||r.city===fcity));
  const av=selCities().reduce((a,c)=>a+(D.op_count[c+'|'+m]||0)*D.dim[i],0);
  return{lab:mlabels()[i],sales:sum(R,'sales'),occ:av?sum(R,'nights')/av*100:0}})}
function byChannel(){const g={};recs().forEach(r=>{const k=r.channel;g[k]=g[k]||{sales:0,fee:0,vat:0,nights:0};g[k].sales+=r.sales;g[k].fee+=r.fee;g[k].vat+=r.vat;g[k].nights+=r.nights});
  return Object.entries(g).map(([name,v])=>({name,sales:v.sales,fee:v.fee,vat:v.vat,net:v.sales-v.fee-v.vat,margin:v.sales?(v.sales-v.fee-v.vat)/v.sales*100:0})).filter(c=>c.sales>0).sort((a,b)=>b.sales-a.sales)}

function toggleLang(){lang=lang==='en'?'ar':'en';document.getElementById('langbtn').textContent=lang==='en'?'العربية':'English';
  document.documentElement.lang=lang;document.documentElement.dir=L().dir;buildFilters();render()}
function setFilter(){fcity=document.getElementById('fCity').value;fmonth=document.getElementById('fMonth').value;render()}
function buildFilters(){const t=L();document.getElementById('lblCity').textContent=t.city+':';document.getElementById('lblMonth').textContent=t.month+':';
  document.getElementById('fCity').innerHTML=`<option value="all">${t.all}</option>`+cities().map(c=>`<option value="${c}" ${c===fcity?'selected':''}>${CITY[lang][c]}</option>`).join('');
  document.getElementById('fMonth').innerHTML=`<option value="all">${t.all}</option>`+mlabels().map((m,i)=>`<option value="${i+1}" ${(i+1)==fmonth?'selected':''}>${m}</option>`).join('');}
function go(i){page=i;render();window.scrollTo(0,0)}
function kpiCard(cls,v,l){return `<div class="kpi ${cls}"><div class="v">${v}</div><div class="l">${l}</div></div>`}

function render(){const t=L();
  document.getElementById('h-title').textContent=t.title;document.getElementById('h-sub').textContent=t.sub;
  document.getElementById('footer').textContent=t.footer;
  document.getElementById('nav').innerHTML=t.nav.map((n,i)=>`<button class="${i===page?'active':''}" onclick="go(${i})">${n}</button>`).join('');
  const cl=fcity==='all'?t.all:CITY[lang][fcity];const ml=fmonth==='all'?t.all:mlabels()[+fmonth-1];
  document.getElementById('filterChip').textContent=`${t.showing}: ${cl} · ${ml}`;
  destroy();
  const P=[pOverview,pSales,pOcc,pEvents,pPricing,pNet,pCancel,pRecs];
  document.getElementById('content').innerHTML=P[page].html();P[page].draw();
}

// ---- chart builders ----
function monthlyChart(id){const m=byMonth();
  mk(id,{data:{labels:m.map(x=>x.lab),datasets:[
    {type:'bar',label:L().salesBar,data:m.map(x=>x.sales),backgroundColor:C.blue,borderRadius:5,yAxisID:'y',datalabels:{color:C.blue}},
    {type:'line',label:L().occLine,data:m.map(x=>x.occ),borderColor:C.orange,backgroundColor:C.orange,yAxisID:'y1',tension:.3,pointRadius:4,borderWidth:3,datalabels:{align:'bottom',offset:10,color:'#fff',backgroundColor:C.orange,borderRadius:4,padding:{top:1,bottom:1,left:4,right:4},font:{weight:'bold',size:10}}}]},
   options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{position:'right',suggestedMax:2000000,ticks:{callback:v=>(v/1000)+'k'}},y1:{position:'left',min:0,max:100,grid:{drawOnChartArea:false}}}}})}
function cityOcc(id){const t=L();mk(id,{type:'bar',data:{labels:D.ramadan_city.map(c=>CITY[lang][c.city]),datasets:[
   {label:t.normalP,data:D.ramadan_city.map(c=>c.norm_occ),backgroundColor:C.blue,borderRadius:5},
   {label:t.ramadanP,data:D.ramadan_city.map(c=>c.ram_occ),backgroundColor:C.orange,borderRadius:5}]},
  options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{min:0,max:80}}}})}
function topChart(id){const t=unitsF().sort((a,b)=>b.sales-a.sales).slice(0,10).reverse();
  mk(id,{type:'bar',data:{labels:t.map(u=>u.unit),datasets:[{label:L().sales,data:t.map(u=>u.sales),backgroundColor:C.green,borderRadius:4}]},
   options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grace:'14%',ticks:{callback:v=>(v/1000)+'k'}}}}})}

const pOverview={html(){const t=L(),k=kpis();return `<div class="kpis">
  ${kpiCard('',fmt(k.sales)+' '+t.sar,t.kSales)}${kpiCard('g',k.occ.toFixed(1)+'%',t.kOcc)}${kpiCard('o',fmt(k.adr)+' '+t.sar,t.kAdr)}
  ${kpiCard('t',k.units,t.kUnits)}${kpiCard('p',fmt(k.nights),t.kNights)}${kpiCard('r',fmt(k.net)+' '+t.sar,t.kNet)}</div>
  <div class="card full"><h3>${t.monthlyT}</h3><div class="sub">${t.monthlyS}</div><div class="chartbox tall"><canvas id="ovM"></canvas></div></div>`},draw(){monthlyChart('ovM')}};
const pSales={html(){const t=L();return `<div class="card full"><h3>${t.monthlyT}</h3><div class="sub">${t.monthlyS}</div><div class="chartbox"><canvas id="sM"></canvas></div></div>
  <div class="grid"><div class="card"><h3>${t.chanST}</h3><div class="chartbox"><canvas id="sC"></canvas></div></div>
  <div class="card"><h3>${t.topT}</h3><div class="chartbox"><canvas id="sT"></canvas></div></div></div>`},
  draw(){monthlyChart('sM');const c=byChannel().slice(0,7);
   mk('sC',{type:'bar',data:{labels:c.map(x=>x.name),datasets:[{data:c.map(x=>x.sales),backgroundColor:C.green,borderRadius:4}]},options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grace:'14%',ticks:{callback:v=>(v/1000)+'k'}}}}});topChart('sT')}};
const pOcc={html(){const t=L();return `<div class="card full"><h3>${t.monthlyT}</h3><div class="sub">${t.occLine}</div><div class="chartbox"><canvas id="oM"></canvas></div></div>
  <div class="grid"><div class="card"><h3>${t.occCityT}</h3><div class="sub">${t.occCityS}</div><div class="chartbox"><canvas id="oC"></canvas></div></div>
  <div class="card"><h3>${t.occSampleT}</h3><div class="chartbox"><canvas id="oS"></canvas></div></div></div>`},
  draw(){const m=byMonth();mk('oM',{type:'bar',data:{labels:m.map(x=>x.lab),datasets:[{label:L().occLine,data:m.map(x=>x.occ),backgroundColor:C.blue,borderRadius:5}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100}}}});
   cityOcc('oC');const s=unitsF().sort((a,b)=>b.occ-a.occ).slice(0,10).reverse();
   mk('oS',{type:'bar',data:{labels:s.map(u=>u.unit),datasets:[{data:s.map(u=>u.occ),backgroundColor:C.teal,borderRadius:4}]},options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{suggestedMax:112}}}})}};
const pEvents={html(){const t=L();return `<div class="card full"><h3>${t.daytypeT}</h3><div class="sub">${t.daytypeS}</div><div class="chartbox"><canvas id="eD"></canvas></div></div>
  <div class="card full"><h3>⭐ ${t.ramT}</h3><div class="sub">${t.occCityS}</div><div class="chartbox"><canvas id="eC"></canvas></div><div class="insight">${t.ramI}</div></div>`},
  draw(){const t=L();const dt=(fcity!=='all'&&D.daytype_city[fcity])?D.daytype_city[fcity]:D.daytype;const cats=[['Event',C.green],['Normal',C.blue],['Ramadan',C.orange]];
   const labels={en:['Real Events','Ordinary Days','Ramadan'],ar:['أحداث فعلية','أيام عادية','رمضان']}[lang];
   mk('eD',{data:{labels,datasets:[{type:'bar',label:t.avgDaily,data:cats.map(c=>dt[c[0]].avg_sales),backgroundColor:cats.map(c=>c[1]),yAxisID:'y',borderRadius:5},
     {type:'line',label:t.occLine,data:cats.map(c=>dt[c[0]].occ),borderColor:C.red,backgroundColor:C.red,yAxisID:'y1',tension:.3,pointRadius:5,borderWidth:3,datalabels:{align:'bottom',offset:10,color:'#fff',backgroundColor:C.red,borderRadius:4,padding:{top:1,bottom:1,left:4,right:4},font:{weight:'bold',size:10}}}]},
     options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{position:'right',ticks:{callback:v=>(v/1000)+'k'}},y1:{position:'left',min:0,max:100,grid:{drawOnChartArea:false}}}}});cityOcc('eC')}};
const pPricing={html(){const t=L();return `<div class="card full"><h3>⭐ ${t.scatterT}</h3><div class="sub">${t.scatterS}</div>
  <div class="legend2"><span><i class="dot" style="background:${C.red}"></i>${t.patHi}</span><span><i class="dot" style="background:${C.green}"></i>${t.patLo}</span><span><i class="dot" style="background:${C.grey}"></i>${t.patMid}</span></div>
  <div class="chartbox tall"><canvas id="pS"></canvas></div><div class="insight">${t.scatterI}</div></div>
  <div class="card full"><h3>${t.tableT}</h3><div class="sub">${t.tableS}</div>
   <div class="controls"><input type="search" id="q" placeholder="${t.search}"><select class="tbl" id="fp"><option value="">${t.allPat}</option>
     <option value="low_occ_high_price">${t.patHi}</option><option value="high_occ_low_price">${t.patLo}</option><option value="balanced">${t.patMid}</option></select><span id="cnt" style="color:var(--muted);font-size:13px"></span></div>
   <div class="tablewrap"><table id="tb"><thead><tr><th data-k="unit">${t.cUnit}</th><th data-k="project">${t.cProj}</th><th data-k="city">${t.cCity}</th>
     <th data-k="occ">${t.cOcc}</th><th data-k="sales">${t.cSales}</th><th data-k="net">${t.cNet}</th><th data-k="adr">${t.cAdr}</th><th data-k="pattern">${t.cPat}</th></tr></thead><tbody></tbody></table></div></div>`},
  draw(){const t=L();const col=p=>p==='low_occ_high_price'?C.red:p==='high_occ_low_price'?C.green:C.grey;
   const U=unitsF();const bub=U.map(u=>({x:u.occ,y:u.adr,r:Math.max(4,Math.sqrt(u.sales)/20),unit:u.unit,sales:u.sales,pat:u.pattern}));
   mk('pS',{type:'bubble',data:{datasets:[{data:bub,backgroundColor:bub.map(b=>col(b.pat)+'cc'),borderColor:'#555',borderWidth:.5}]},
     options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const b=c.raw;return `${b.unit}: ${b.x}% · ADR ${b.y} · ${fmt(b.sales)}`}}}},scales:{x:{title:{display:true,text:t.cOcc},min:0,max:100},y:{title:{display:true,text:t.cAdr},min:180}}}});
   const pl={low_occ_high_price:[t.patHi,'b-hi'],high_occ_low_price:[t.patLo,'b-lo'],balanced:[t.patMid,'b-mid']};
   let sk='sales',sd=-1;const tb=document.querySelector('#tb tbody');
   function rt(){const q=(document.getElementById('q').value||'').toLowerCase();const fp=document.getElementById('fp').value;
     let rows=U.filter(u=>(!q||u.unit.toLowerCase().includes(q)||(u.project||'').toLowerCase().includes(q))&&(!fp||u.pattern===fp));
     rows.sort((a,b)=>{const x=a[sk],y=b[sk];return(x>y?1:x<y?-1:0)*sd});
     tb.innerHTML=rows.map(u=>{const p=pl[u.pattern];return `<tr><td><b>${u.unit}</b></td><td>${u.project||''}</td><td>${CITY[lang][u.city]||u.city}</td><td>${u.occ}%</td><td>${fmt(u.sales)}</td><td>${fmt(u.net)}</td><td>${fmt(u.adr)}</td><td><span class="badge ${p[1]}">${p[0]}</span></td></tr>`}).join('');
     document.getElementById('cnt').textContent=rows.length+' '+t.countU}
   document.querySelectorAll('#tb th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;sd=(sk===k)?-sd:-1;sk=k;rt()});
   document.getElementById('q').oninput=rt;document.getElementById('fp').onchange=rt;rt()}};
const pNet={html(){const t=L(),k=kpis();return `<div class="kpis">
  ${kpiCard('g',fmt(k.net)+' '+t.sar,t.kNet)}${kpiCard('',fmt(k.sales)+' '+t.sar,t.kSales)}${kpiCard('o',fmt(k.fee)+' '+t.sar,t.kFees)}${kpiCard('t',k.margin.toFixed(1)+'%',t.kMargin)}</div>
  <div class="card full"><h3>${t.netT}</h3><div class="sub">${t.netS}</div><div class="chartbox tall"><canvas id="nC"></canvas></div></div>
  <div class="card full"><h3>${t.marginT}</h3><div class="chartbox"><canvas id="nM"></canvas></div><div class="insight">${t.netInsight}</div></div>`},
  draw(){const t=L();const c=byChannel().slice(0,7);
   mk('nC',{type:'bar',data:{labels:c.map(x=>x.name),datasets:[
     {label:t.kFees,data:c.map(x=>x.fee+x.vat),backgroundColor:C.red,borderRadius:4,stack:'s',datalabels:{display:false}},
     {label:t.net,data:c.map(x=>x.net),backgroundColor:C.green,borderRadius:4,stack:'s',datalabels:{anchor:'end',align:'end',color:'#2b3645',font:{weight:'bold',size:10},formatter:v=>(v/1000).toFixed(0)+'k'}}]},
     options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{stacked:true,grace:'12%',ticks:{callback:v=>(v/1000)+'k'}},y:{stacked:true}}}});
   mk('nM',{type:'bar',data:{labels:c.map(x=>x.name),datasets:[{data:c.map(x=>x.margin),backgroundColor:C.teal,borderRadius:4}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grace:'15%',title:{display:true,text:'%'}}}}})}};
// ---- cancellation filtering (respects city + month) ----
function canrecs(){return D.cancel_records.filter(r=>(fcity==='all'||r.city===fcity)&&(fmonth==='all'||r.month==+fmonth))}
function canKpis(){const R=canrecs();const count=R.reduce((s,x)=>s+x.count,0),nights=R.reduce((s,x)=>s+x.nights,0);
  let conf=0;for(const c of selCities())for(const m of selMonths())conf+=(D.book_count[c+'|'+m]||0);
  return{count,nights,lost:Math.round(nights*D.adr_overall),rate:(count+conf)?count/(count+conf)*100:0}}
function canByMonth(){return D.months.map((lab,i)=>[lab,D.cancel_records.filter(r=>r.month===i+1&&(fcity==='all'||r.city===fcity)).reduce((s,x)=>s+x.count,0)])}
function canByChannel(){const g={};canrecs().forEach(r=>g[r.channel]=(g[r.channel]||0)+r.count);return Object.entries(g).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,6)}
function canByCity(){return['Riyadh','Al-madinah'].map(c=>[c,D.cancel_records.filter(r=>r.city===c&&(fmonth==='all'||r.month==+fmonth)).reduce((s,x)=>s+x.count,0)]).filter(x=>x[1]>0)}
const pCancel={html(){const t=L(),k=canKpis();return `<div class="kpis">
  ${kpiCard('r',fmt(k.count),t.kCancel)}${kpiCard('o',fmt(k.nights),lang==='ar'?'ليالٍ مفقودة':'Lost nights')}${kpiCard('p','~'+fmt(k.lost)+' '+t.sar,lang==='ar'?'إيراد معرّض للخطر':'Revenue at risk')}${kpiCard('',k.rate.toFixed(1)+'%',lang==='ar'?'نسبة الإلغاء':'Cancel rate')}</div>
  <div class="card full"><h3>${t.canMonthT}</h3><div class="chartbox"><canvas id="cM"></canvas></div></div>
  <div class="grid"><div class="card"><h3>${t.canChanT}</h3><div class="chartbox"><canvas id="cC"></canvas></div></div>
  <div class="card"><h3>${t.canCityT}</h3><div class="chartbox"><canvas id="cT"></canvas></div></div></div>
  <div class="card full"><div class="insight">${t.canI}</div></div>`},
  draw(){const t=L();const bm=canByMonth(),bc=canByChannel(),bt=canByCity();
   mk('cM',{type:'bar',data:{labels:bm.map(x=>x[0]),datasets:[{data:bm.map(x=>x[1]),backgroundColor:C.red,borderRadius:5}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false}}}});
   mk('cC',{type:'bar',data:{labels:bc.map(x=>x[0]),datasets:[{data:bc.map(x=>x[1]),backgroundColor:C.orange,borderRadius:4}]},options:{indexAxis:'y',maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grace:'14%'}}}});
   mk('cT',{type:'doughnut',data:{labels:bt.map(x=>CITY[lang][x[0]]||x[0]),datasets:[{data:bt.map(x=>x[1]),backgroundColor:[C.blue,C.teal]}]},options:{maintainAspectRatio:false,plugins:{legend:{position:'bottom'},datalabels:{anchor:'center',align:'center',color:'#fff',font:{weight:'bold',size:14}}}}})}};
const pRecs={html(){const t=L();return `<div class="card full"><h3>${t.recsT}</h3>
  ${t.recs.map(r=>`<div class="rec ${r[0]}"><div class="ic">${r[1]}</div><div><h4>${r[2]}</h4><p>${r[3]}</p></div></div>`).join('')}</div>`},draw(){}};

buildFilters();render();
</script>
</body>
</html>
